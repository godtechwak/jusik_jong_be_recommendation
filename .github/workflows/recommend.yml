name: 종가 베팅 추천

on:
  schedule:
    # KRX 정규거래소: 15:10 KST = 06:10 UTC (월~금)
    - cron: '10 6 * * 1-5'
    # NXT 넥스트레이드: 19:40 KST = 10:40 UTC (월~금)
    - cron: '40 10 * * 1-5'

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      session:
        description: '세션 선택 (krx / nxt)'
        required: true
        default: 'krx'
        type: choice
        options:
          - krx
          - nxt
      force:
        description: '시간 체크 무시'
        required: false
        default: true
        type: boolean

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      # ── 세션 결정 ──────────────────────────────────────────────
      # cron 트리거: UTC 시간으로 어떤 세션인지 판별
      # workflow_dispatch: 입력값 사용
      - name: 실행 세션 결정
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SESSION=${{ github.event.inputs.session }}" >> $GITHUB_ENV
            echo "FORCE_FLAG=${{ github.event.inputs.force == 'true' && '--force' || '' }}" >> $GITHUB_ENV
          else
            # UTC 시간 기준으로 세션 판별
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            TIME_NUM=$((HOUR * 100 + MINUTE))
            if [ $TIME_NUM -ge 600 ] && [ $TIME_NUM -lt 700 ]; then
              echo "SESSION=krx" >> $GITHUB_ENV
            else
              echo "SESSION=nxt" >> $GITHUB_ENV
            fi
            echo "FORCE_FLAG=--force" >> $GITHUB_ENV
          fi

      - name: 한국 공휴일 체크
        id: holiday
        run: |
          python3 - <<'EOF'
          import datetime, sys
          # 간단한 공휴일 체크 (주말은 cron이 제외, 여기선 주요 법정공휴일만)
          today = datetime.date.today()
          # 2026년 법정공휴일 (필요 시 매년 업데이트)
          HOLIDAYS_2026 = {
              "2026-01-01", "2026-01-28", "2026-01-29", "2026-01-30",
              "2026-03-01", "2026-05-05", "2026-05-25", "2026-06-06",
              "2026-08-15", "2026-09-24", "2026-09-25", "2026-09-26",
              "2026-10-03", "2026-10-09", "2026-12-25",
          }
          HOLIDAYS_2025 = {
              "2025-01-01", "2025-01-28", "2025-01-29", "2025-01-30",
              "2025-03-01", "2025-05-05", "2025-05-06", "2025-06-06",
              "2025-08-15", "2025-10-03", "2025-10-06", "2025-10-07",
              "2025-10-08", "2025-10-09", "2025-12-25",
          }
          HOLIDAYS = HOLIDAYS_2026 | HOLIDAYS_2025
          if str(today) in HOLIDAYS:
              print(f"오늘({today})은 공휴일 - 실행 생략")
              print("IS_HOLIDAY=true")
              with open("$GITHUB_ENV", "a") as f:
                  f.write("IS_HOLIDAY=true\n")
          else:
              with open("$GITHUB_ENV", "a") as f:
                  f.write("IS_HOLIDAY=false\n")
          EOF

      - name: 추천 실행 (${{ env.SESSION }} 세션)
        if: env.IS_HOLIDAY != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --session ${{ env.SESSION }} \
            --discord \
            --no-save \
            ${{ env.FORCE_FLAG }}

      - name: 공휴일 스킵 알림
        if: env.IS_HOLIDAY == 'true'
        run: echo "공휴일로 실행을 건너뜁니다."
